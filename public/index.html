<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CS2 Demo AI Coach</title>
    <link rel="stylesheet" href="/styles.css?v=7">
  </head>
  <body>
    <div class="app-shell" id="appShell">
      <nav class="topbar-nav hidden" id="topbarNav">
        <div class="brand">
          <div class="brand-mark">C2</div>
          <h1>CS2 Demo AI Coach</h1>
        </div>
        <div class="topbar-actions">
          <button id="themeToggle" class="theme-toggle" type="button" title="切换主题">
            <span id="themeIcon">☀️</span>
          </button>
          <button id="newAnalysisBtn" class="secondary-button" type="button">+ 新分析</button>
          <button id="copyShareLink" class="secondary-button disabled" type="button" disabled>复制分享链接</button>
          <a id="exportLink" class="secondary-button disabled" href="#" aria-disabled="true">导出 MD</a>
        </div>
      </nav>

      <main class="workspace" id="workspace">
        <div class="empty-state-container" id="emptyState">
          <h2 class="page-title">拖放 .dem 文件至此开始分析</h2>

          <label class="drop-zone" id="dropZone">
            <input id="fileInput" type="file" accept=".dem">
            <span class="upload-icon">↑</span>
            <span class="drop-title">拖放或点击上传 Demo 文件</span>
            <span class="drop-subtitle">仅支持 .dem 格式，MVP 上限 500 MB</span>
          </label>

          <div class="progress-wrap" aria-live="polite">
            <div class="progress-meta">
              <span id="uploadStatus">等待上传</span>
              <span id="uploadPercent">0%</span>
            </div>
            <div class="progress-track">
              <div class="progress-bar" id="uploadProgress"></div>
            </div>
          </div>

          <button id="sampleButton" class="secondary-button" type="button">生成样例报告</button>

          <div class="history-section" id="historySection">
            <h3 class="history-label">最近分析</h3>
            <div class="history-scroll">
              <div id="historyList" class="history-cards"></div>
            </div>
          </div>
        </div>

        <div class="report-main hidden" id="reportMain">
          <nav class="tabs" aria-label="报告视图">
            <button class="tab active" data-tab="overview" type="button">概览</button>
            <button class="tab" data-tab="personal" type="button">个人</button>
            <button class="tab" data-tab="team" type="button">团队</button>
            <button class="tab" data-tab="rounds" type="button">关键回合</button>
            <button class="tab" data-tab="tactics" type="button">战术</button>
            <button class="tab" data-tab="training" type="button">训练</button>
          </nav>
          <div id="reportContent" class="report-content"></div>
        </div>

        <aside class="match-overview-sidebar hidden" id="matchOverview">
          <div class="panel">
            <div class="panel-heading">
              <h2 id="matchTitle">比赛概览</h2>
              <span id="parserBadge" class="badge muted">未解析</span>
            </div>
            <div id="matchSummary" class="empty-state">
              上传 demo 后会显示地图、比分、回合等信息。
            </div>
          </div>

          <div class="panel" id="selectionPanel">
            <div class="panel-heading">
              <h2>选择队伍</h2>
              <span id="selectedCount" class="badge muted">0 / 5</span>
            </div>
            <div id="playerList" class="player-list empty-state">等待解析玩家列表</div>
            <label class="field">
              <span>重点分析对象</span>
              <select id="focusPlayer" disabled>
                <option>先选择五名队员</option>
              </select>
            </label>
            <label class="field">
              <span>目标位置</span>
              <select id="targetRole">
                <option value="Auto">自动判断</option>
                <option value="Entry">Entry</option>
                <option value="Second entry">Second entry</option>
                <option value="Support">Support</option>
                <option value="Lurker">Lurker</option>
                <option value="AWPer">AWPer</option>
                <option value="Anchor">Anchor</option>
                <option value="Rotator">Rotator</option>
                <option value="Clutcher">Clutcher</option>
                <option value="IGL tendency">IGL 倾向</option>
              </select>
            </label>
            <button id="createReport" class="primary-button" type="button" disabled>生成复盘报告</button>
            <p id="selectionHint" class="hint">需要选择己方五名玩家和一个重点分析对象。</p>
          </div>
        </aside>
      </main>
    </div>

    <template id="statTemplate">
      <div class="stat">
        <span class="stat-label"></span>
        <strong class="stat-value"></strong>
      </div>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
